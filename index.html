<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Form</title>

<script src="https://kit.fontawesome.com/8b8fb16f60.js" crossorigin="anonymous"></script>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

/* MAIN CONTAINER */
.grandparent{
    display: flex;
    min-height: 100vh;
}

/* LEFT SIDE */
.parentone{
    width: 45%;
    background-image: url(1132768_OQCI8C0.jpg);
    background-position: center;
    background-size: cover;
    border-top-right-radius: 20px;
    border-bottom-right-radius: 20px;

    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: white;
}

#ast{
    font-size: 30px;
    padding: 30px 20px;
}

.easy{
    padding: 20px;
}

.get{
    max-width: 400px;
}

/* RIGHT SIDE */
.parenttwo{
    width: 55%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.parentdiv{
    width: 100%;
    max-width: 400px;
    padding: 40px;
}

/* TEXT */
#create{
    margin-bottom: 10px;
}

.aces{
    margin-bottom: 20px;
}

/* INPUTS */
.emaildiv, .passdiv{
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

.inputemail, .inputpass{
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #999;
}

/* BUTTON */
.getbtn{
    width: 100%;
    border: none;
    background-color: purple;
    color: white;
    border-radius: 5px;
    padding: 12px;
    margin-bottom: 20px;
    cursor: pointer;
}

/* DIVIDER */
.contdiv{
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.contone, .conttwo{
    flex: 1;
    height: 1px;
    background: black;
}

/* SOCIAL */
.branddiv{
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

#brand{
    padding: 10px 20px;
    background: #ccc;
    border-radius: 10px;
}

/* FOOTER */
.don{
    text-align: center;
    font-size: 14px;
}

.signn{
    color: purple;
    font-weight: bold;
}

/* ========================= */
/* 📱 MOBILE RESPONSIVENESS */
/* ========================= */

@media (max-width: 768px){

    .grandparent{
        flex-direction: column;
    }

    .parentone{
        width: 100%;
        height: 40vh;
        border-radius: 0;
    }

    .parenttwo{
        width: 100%;
    }

    .parentdiv{
        padding: 20px;
    }

    .get{
        font-size: 20px;
    }

}

/* ========================= */
/* 💻 LARGE SCREEN TWEAKS */
/* ========================= */

@media (min-width: 1200px){
    .parentdiv{
        max-width: 450px;
    }
}

</style>
</head>

<body>

<div class="grandparent">

    <!-- LEFT -->
    <div class="parentone">
        <i class="fa-solid fa-asterisk" id="ast"></i>

        <div class="easy">
            <h4>You can easily</h4>
            <h1 class="get">
                Get access your personal <br>
                hub for clarity and <br>
                productivity
            </h1>
        </div>
    </div>

    <!-- RIGHT -->
    <form class="parenttwo">
        <div class="parentdiv">

            <i class="fa-solid fa-asterisk" style="color:purple;"></i>

            <h1>Get an account</h1>

            <p class="aces">
                Access your task note, and projects anytime,
                anywhere - and keep everything flowing in one place.
            </p>

            <div class="emaildiv">
                <label>Your email</label>
                <input type="email" class="inputemail" placeholder="example@gmail.com">
            </div>

            <div class="passdiv">
                <label>Password</label>
                <input type="password" class="inputpass" placeholder="********">
            </div>

            <button class="getbtn">Get Started</button>

            <div class="contdiv">
                <div class="contone"></div>
                <p>or continue with</p>
                <div class="conttwo"></div>
            </div>

            <div class="branddiv">
                <i class="fa-brands fa-behance" id="brand"></i>
                <i class="fa-brands fa-google" id="brand"></i>
                <i class="fa-brands fa-facebook" id="brand"></i>
            </div>

            <p class="don">
                Don't have an account?
                <span class="signn">Sign up</span>
            </p>

        </div>
    </form>

</div>

</body>
</html>
